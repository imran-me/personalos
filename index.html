<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts: Plus Jakarta Sans (display), Inter (body), JetBrains Mono (numbers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 CSS + Bootstrap Icons (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Centralized stylesheet -->
  <link href="./assets/css/style.css" rel="stylesheet">
  <!-- EON · AI Companion styles (isolated module) -->
  <link href="./ai-companion/css/companion.css" rel="stylesheet">
  <link href="./ai-companion/css/home.css" rel="stylesheet">
  <link href="./ai-companion/css/animations.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <title>OppTrack · Personal Opportunity & Life Management System</title>
</head>
<!-- viewer-mode is the safe default; Security flips it to owner-mode after login -->
<body data-page="index" class="viewer-mode">
  <main class="landing">
    <div class="landing-card">
      <div class="hero-row">
        <div>
          <div class="lg-brand"><span class="lg-logo">O</span>
            <div><b style="font-family:var(--font-display);font-size:18px;display:block;line-height:1">OppTrack</b><small class="text-soft" style="font-size:12px;letter-spacing:.04em">LIFE OS</small></div>
          </div>
          <h1>Welcome back, <span id="lgName" style="color:var(--primary-700)">there</span>.</h1>
          <p class="intro">Your personal command centre for opportunities, applications, deadlines, achievements and research — all in one private, offline-first workspace.</p>
          <div class="d-flex flex-wrap gap-2">
            <a href="dashboard.html" class="btn btn-primary"><i class="bi bi-speedometer2 me-1"></i>Open dashboard</a>
            <a href="opportunities.html" class="btn btn-ghost"><i class="bi bi-compass me-1"></i>Opportunities</a>
            <a href="profile.html" class="btn btn-ghost"><i class="bi bi-person-badge me-1"></i>Portfolio</a>
            <!-- Owner login / session control rendered by Security -->
            <div id="authSlot" class="auth-slot d-flex align-items-center gap-2"></div>
          </div>
        </div>
        <!-- Live snapshot -->
        <div class="lg-panel">
          <div class="section-title">At a glance</div>
          <div id="lgStats"></div>
          <p class="text-faint mt-3 mb-0" style="font-size:11.5px"><i class="bi bi-hdd me-1"></i>Saved locally in your browser. Export a backup any time.</p>
        </div>
      </div>
    </div>
  </main>
  <!-- Bootstrap bundle (modals, dropdowns) + centralized app engine -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Security layer MUST load before app.js so it can gate the page -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./assets/js/firebase-config.js"></script>
  <script src="./assets/js/drive.js"></script>
  <script src="./assets/js/security.js"></script>
  <script src="./assets/js/app.js"></script>

  <!-- ===== EON · AI Companion (isolated module) — remove these 2 blocks to remove EON ===== -->
  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="./ai-companion/js/main.js"></script>
  <script type="module" src="./ai-companion/eon-brain/eon-brain.js"></script>
</body>
</html>
