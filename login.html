<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
  <!-- EON · AI Companion styles (isolated module) -->
  <link href="./ai-companion/css/companion.css" rel="stylesheet">
  <link href="./ai-companion/css/home.css" rel="stylesheet">
  <link href="./ai-companion/css/animations.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <title>Owner Login · OppTrack</title>
</head>
<!-- data-page="login" → app.js skips its normal chrome on this page -->
<body data-page="login" class="auth-body">

  <main class="auth-wrap">
    <div class="auth-card card">
      <div class="auth-brand">
        <span class="lg-logo">O</span>
        <div>
          <b style="font-family:var(--font-display);font-size:18px;display:block;line-height:1">OppTrack</b>
          <small class="text-soft" style="font-size:12px;letter-spacing:.04em">OWNER ACCESS</small>
        </div>
      </div>

      <div class="auth-lock"><i class="bi bi-shield-lock-fill"></i></div>
      <h1 class="auth-title">Owner sign in</h1>
      <p class="text-soft auth-sub">
        This site is public to view. Sign in to add, edit, manage or delete content.
      </p>

      <!-- Login form -->
      <form id="loginForm" autocomplete="off" novalidate>
        <div class="field auth-field">
          <label for="email">Owner email</label>
          <div class="auth-input">
            <i class="bi bi-envelope"></i>
            <input type="email" id="email" placeholder="Enter email" autocomplete="username" required>
          </div>
        </div>

        <div class="field auth-field">
          <label for="pw">Owner password</label>
          <div class="auth-input">
            <i class="bi bi-key"></i>
            <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" required>
            <button type="button" class="auth-eye" id="toggleEye" aria-label="Show/hide password" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div id="authError" class="auth-error" hidden>
          <i class="bi bi-exclamation-circle-fill me-1"></i><span></span>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="loginBtn">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
        </button>
      </form>

      <a href="index.html" class="auth-back"><i class="bi bi-arrow-left me-1"></i>Back to public site</a>
    </div>

    <p class="auth-foot text-faint">
      <i class="bi bi-shield-lock me-1"></i>Authorized owner access only.
    </p>
  </main>

  <!-- Security layer first, then Bootstrap (not strictly needed here). -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./assets/js/firebase-config.js"></script>
  <script src="./assets/js/drive.js"></script>
  <script src="./assets/js/security.js"></script>
  <script>
    /* Standalone login controller — no app.js needed on this page. */
    (async () => {
      await Security.init();
      // Already signed in? Skip the form and go straight in.
      if (Security.isOwner()) { redirectNext(); return; }

      const form  = document.getElementById('loginForm');
      const email = document.getElementById('email');
      const pw    = document.getElementById('pw');
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('authError');
      const eye   = document.getElementById('toggleEye');

      // Show / hide password
      eye.onclick = () => {
        const show = pw.type === 'password';
        pw.type = show ? 'text' : 'password';
        eye.firstElementChild.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
      };

      function showError(msg) {
        errEl.querySelector('span').textContent = msg;
        errEl.hidden = false;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.hidden = true;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Checking…';

        const ok = await Security.login(email.value, pw.value);

        if (ok === true) {
          btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Welcome back';
          redirectNext();
        } else {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i>Sign in';
          if (ok === 'locked') {
            showError('Too many attempts. Please wait a few minutes and try again.');
          } else if (ok === 'notowner') {
            showError('That account is not authorized to manage this site.');
          } else if (ok === 'offline') {
            showError('Cannot reach the server. Check your internet connection.');
          } else {
            showError('Incorrect email or password. Please try again.');
          }
          pw.value = '';
          pw.focus();
        }
      });

      /* Send the owner to ?next=… if it is a safe local page,
         otherwise to the owner dashboard. */
      function redirectNext() {
        const next = new URLSearchParams(location.search).get('next');
        const safe = next && /^[\w.-]+\.html(\?[\w%=&.-]*)?$/.test(next) && !next.startsWith('login');
        location.replace(safe ? next : Security.OWNER_PAGE);
      }
    })();
  </script>

  <!-- ===== EON · AI Companion (isolated module) — remove these 2 blocks to remove EON ===== -->
  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="./ai-companion/js/main.js"></script>
  <script type="module" src="./ai-companion/eon-brain/eon-brain.js"></script>
</body>
</html>
