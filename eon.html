<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
  <link href="./ai-companion/css/companion.css" rel="stylesheet">
  <link href="./ai-companion/css/home.css" rel="stylesheet">
  <link href="./ai-companion/css/animations.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <title>Eon Intelligence · OppTrack</title>
</head>
<body data-page="eon" class="app-shell viewer-mode">

  <aside id="sidebar" class="sidebar"></aside>

  <div class="main">
    <header id="topbar" class="topbar"></header>
    <div class="page-wrap">
      <!-- The Eon Intelligence deck renders here (portable module) -->
      <div id="eonDeck" class="owner-only"></div>

      <!-- Native productivity + opportunity signal intelligence (moved here from the dashboard) -->
      <div class="eon-native owner-only" style="max-width:1160px;margin-top:8px">
        <div style="display:flex;align-items:center;gap:14px;margin:0 0 14px">
          <span style="font:800 11.5px 'Inter',system-ui;text-transform:uppercase;letter-spacing:.14em;color:var(--text-soft)">Signals &amp; productivity</span>
          <span style="flex:1;height:1px;background:var(--line)"></span>
        </div>
        <div class="card card-pad mb-3 owner-only" id="signalCard">
          <div class="d-flex align-items-center mb-2">
            <div class="section-title mb-0"><i class="bi bi-broadcast-pin me-1"></i>EON signal radar</div>
            <span class="ms-auto text-faint" style="font-size:11.5px">Highest-return moves, by your own patterns</span>
          </div>
          <div id="signalPanel" class="sig-list"></div>
        </div>
        <div class="grid-2 mb-3">
          <div class="card card-pad owner-only">
            <div class="section-title mb-2"><i class="bi bi-sun me-1"></i>EON's realistic day</div>
            <div id="realisticDay" class="rd-list"></div>
          </div>
          <div class="card card-pad owner-only">
            <div class="section-title mb-2"><i class="bi bi-diagram-2 me-1"></i>Your tracks</div>
            <div id="tracksPanel" class="trk-list"></div>
          </div>
        </div>
        <div class="card card-pad owner-only">
          <div class="section-title mb-2"><i class="bi bi-activity me-1"></i>Productivity pulse</div>
          <div id="pulsePanel"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./assets/js/firebase-config.js"></script>
  <script src="./assets/js/drive.js"></script>
  <script src="./assets/js/security.js"></script>
  <script src="./assets/js/app.js"></script>

  <!-- ===== EON · AI Companion + Intelligence deck ===== -->
  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="./ai-companion/js/main.js"></script>
  <script type="module" src="./ai-companion/eon-brain/eon-brain.js"></script>
  <script type="module" src="./ai-companion/eon-brain/analytics/prover.js"></script>
  <script type="module" src="./ai-companion/eon-brain/intel/workstation.js"></script>
  <!-- The dedicated inline intelligence deck -->
  <script type="module" src="./ai-companion/eon-brain/intel/deck.js"></script>
</body>
</html>
