<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
  <link href="./assets/css/academics.css" rel="stylesheet">
  <link href="./ai-companion/css/companion.css" rel="stylesheet">
  <link href="./ai-companion/css/home.css" rel="stylesheet">
  <link href="./ai-companion/css/animations.css" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./assets/img/favicon.svg">
  <title>Academics · OppTrack</title>
</head>
<body data-page="academics" class="app-shell viewer-mode">

  <aside id="sidebar" class="sidebar"></aside>

  <div class="main">
    <header id="topbar" class="topbar"></header>
    <div class="page-wrap">

      <!-- Semester / programme stats -->
      <section class="mb-4"><div id="acadStats" class="stat-grid"></div></section>

      <!-- Today's classes — one-tap attendance -->
      <div class="card card-pad mb-4" id="acadTodayCard">
        <div class="d-flex align-items-center mb-2">
          <div class="section-title mb-0"><i class="bi bi-sun me-1"></i>Today's classes</div>
          <span class="ms-auto text-faint" style="font-size:11.5px">One tap marks attendance — no forms</span>
        </div>
        <div id="acadToday"></div>
      </div>

      <!-- Weekly schedule (auto-generated from course class days) -->
      <div class="card card-pad mb-4">
        <div class="d-flex align-items-center mb-3">
          <div class="section-title mb-0"><i class="bi bi-calendar3 me-1"></i>Weekly schedule</div>
          <span class="ms-auto text-faint" style="font-size:11.5px">Auto-built from each course's class days — edit the course to change it</span>
        </div>
        <div id="acadSchedule" class="acad-week"></div>
      </div>

      <!-- Courses -->
      <div class="card card-pad mb-4">
        <div class="d-flex align-items-center mb-3">
          <div class="section-title mb-0"><i class="bi bi-journal-bookmark me-1"></i>Courses</div>
          <div class="ms-auto d-flex gap-2">
            <button class="btn btn-ghost btn-sm owner-only" id="acadProgBtn"><i class="bi bi-mortarboard me-1"></i>Programme</button>
            <button class="btn btn-ghost btn-sm owner-only" id="acadFacBtn"><i class="bi bi-person-badge me-1"></i>Faculty</button>
            <button class="btn btn-primary btn-sm owner-only" id="acadCourseAdd"><i class="bi bi-plus-lg me-1"></i>Add course</button>
          </div>
        </div>
        <div id="acadCourses" class="acad-courses"></div>
      </div>

      <!-- Assessments: tests, quizzes, midterms, finals -->
      <div class="card card-pad mb-4">
        <div class="d-flex align-items-center mb-3">
          <div class="section-title mb-0"><i class="bi bi-pencil-square me-1"></i>Tests &amp; quizzes</div>
          <button class="btn btn-primary btn-sm owner-only ms-auto" id="acadAssessAdd"><i class="bi bi-plus-lg me-1"></i>Add assessment</button>
        </div>
        <div id="acadAssessUpcoming" class="mb-3"></div>
        <div id="acadAssessResults"></div>
      </div>

      <!-- Assignment board — live Kanban with a working canvas -->
      <div class="card card-pad mb-4">
        <div class="d-flex align-items-center mb-3">
          <div class="section-title mb-0"><i class="bi bi-kanban me-1"></i>Assignment board</div>
          <span class="ms-auto text-faint me-3" style="font-size:11.5px">Drag to move · click a card to write in it — everything auto-saves</span>
          <button class="btn btn-primary btn-sm owner-only" id="acadAsgAdd"><i class="bi bi-plus-lg me-1"></i>Add assignment</button>
        </div>
        <div id="acadBoard" class="kanban acad-board"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="./assets/js/firebase-config.js"></script>
  <script src="./assets/js/drive.js"></script>
  <script src="./assets/js/security.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/academics.js"></script>

  <!-- ===== EON · AI Companion ===== -->
  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <script type="module" src="./ai-companion/js/boot.js"></script>
</body>
</html>
